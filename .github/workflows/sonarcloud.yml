# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow helps you trigger a SonarCloud analysis of your code and populates
# GitHub Code Scanning alerts with the vulnerabilities found.
# Free for open source project.

# 1. Login to SonarCloud.io using your GitHub account

# 2. Import your project on SonarCloud
#     * Add your GitHub organization first, then add your repository as a new project.
#     * Please note that many languages are eligible for automatic analysis,
#       which means that the analysis will start automatically without the need to set up GitHub Actions.
#     * This behavior can be changed in Administration > Analysis Method.
#
# 3. Follow the SonarCloud in-product tutorial
#     * a. Copy/paste the Project Key and the Organization Key into the args parameter below
#          (You'll find this information in SonarCloud. Click on "Information" at the bottom left)
#
#     * b. Generate a new token and add it to your Github repository's secrets using the name SONAR_TOKEN
#          (On SonarCloud, click on your avatar on top-right > My account > Security
#           or go directly to https://sonarcloud.io/account/security/)

# Feel free to take a look at our documentation (https://docs.sonarcloud.io/getting-started/github/)
# or reach out to our community forum if you need some help (https://community.sonarsource.com/c/help/sc/9)

name: SonarCloud analysis

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  sonar-check:
    name: Sonar Check
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with: 
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install/Update SonarScanner
        run: |
          dotnet tool install --global dotnet-sonarscanner 2>&1 | Out-Null
          if ($LASTEXITCODE -ne 0) {
            dotnet tool update --global dotnet-sonarscanner
          }
        shell: pwsh

      - name: Restore Dependencies
        run: dotnet restore NetSdrClient.sln

      - name: SonarScanner Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            Write-Host "Running PR analysis for PR #${{ github.event.pull_request.number }}"
            dotnet sonarscanner begin `
              /k:"ppanchen_NetSdrClient" `
              /o:"ppanchen" `
              /d:sonar.host.url="https://sonarcloud.io" `
              /d:sonar.token="$env:SONAR_TOKEN" `
              /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" `
              /d:sonar.exclusions="**/bin/**,**/obj/**,**/*Tests/**" `
              /d:sonar.coverage.exclusions="**/*Tests/**" `
              /d:sonar.pullrequest.key="${{ github.event.pull_request.number }}" `
              /d:sonar.pullrequest.branch="${{ github.head_ref }}" `
              /d:sonar.pullrequest.base="${{ github.base_ref }}"
          } else {
            Write-Host "Running branch analysis for ${{ github.ref_name }}"
            dotnet sonarscanner begin `
              /k:"ppanchen_NetSdrClient" `
              /o:"ppanchen" `
              /d:sonar.host.url="https://sonarcloud.io" `
              /d:sonar.token="$env:SONAR_TOKEN" `
              /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" `
              /d:sonar.exclusions="**/bin/**,**/obj/**,**/*Tests/**" `
              /d:sonar.coverage.exclusions="**/*Tests/**"
          }
        shell: pwsh

      - name: Build Solution
        run: dotnet build NetSdrClient.sln -c Release --no-restore

      - name: Run Tests with Coverage
        run: |
          dotnet test NetSdrClientAppTests/NetSdrClientAppTests.csproj `
            --configuration Release `
            --no-build `
            /p:CollectCoverage=true `
            /p:CoverletOutputFormat=opencover `
            /p:CoverletOutput=./coverage.opencover.xml `
            /p:Exclude="[*Tests]*"
        shell: pwsh
        continue-on-error: true

      - name: Verify Coverage File
        run: |
          $coverageFile = "NetSdrClientAppTests/coverage.opencover.xml"
          if (Test-Path $coverageFile) {
            Write-Host "✅ Coverage file found: $coverageFile" -ForegroundColor Green
            $size = (Get-Item $coverageFile).Length
            Write-Host "File size: $size bytes"
            if ($size -lt 100) {
              Write-Host "⚠️ Warning: Coverage file seems too small" -ForegroundColor Yellow
            }
          } else {
            Write-Host "⚠️ Coverage file not found at: $coverageFile" -ForegroundColor Yellow
            Write-Host "Searching for coverage files..."
            Get-ChildItem -Path . -Recurse -Filter "*.opencover.xml" | ForEach-Object {
              Write-Host "Found: $($_.FullName)"
            }
          }
        shell: pwsh

      - name: SonarScanner End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
        shell: pwsh
